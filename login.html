<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | AI Hub</title>

<link rel="stylesheet" href="style.css">

<style>

.login-page{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

.login-card{

width:100%;
max-width:420px;

background:#1e293b;

padding:35px;

border-radius:20px;

box-shadow:0 0 25px rgba(56,189,248,.35);

text-align:center;

}

.login-card h1{

color:#38bdf8;
margin-bottom:10px;

}

.login-card p{

color:#cbd5e1;
margin-bottom:25px;

}

.login-card input{

width:100%;

padding:15px;

margin:10px 0;

border:none;

border-radius:10px;

background:#0f172a;

color:white;

font-size:16px;

}

.login-card input:focus{

outline:2px solid #38bdf8;

}

.login-btn{

width:100%;

padding:15px;

margin-top:15px;

border:none;

border-radius:10px;

background:#38bdf8;

color:white;

font-size:18px;

cursor:pointer;

transition:.3s;

}

.login-btn:hover{

transform:scale(1.03);

background:#0ea5e9;

}

.google-btn{

width:100%;

padding:15px;

margin-top:15px;

border:none;

border-radius:10px;

background:white;

color:black;

font-size:16px;

cursor:pointer;

}

.signup-link{

margin-top:20px;

display:block;

color:#38bdf8;

text-decoration:none;

}

</style>

</head>

<body>

<section class="login-page">

<div class="login-card">

<h1>🤖 AI Hub</h1>

<p>Welcome Back 👋</p>

<input type="email" id="email" placeholder="📧 Email">

<input type="password" id="password" placeholder="🔒 Password">

<button class="login-btn" id="loginBtn">
🚀 Login
</button>

<button class="google-btn" id="googleBtn">
  🔵 Continue with Google
</button>

<a href="signup.html" class="signup-link">

Don't have an account?

Create Account →

</a>

<br>

<a href="index.html" class="visit-btn">

⬅ Back to Home

</a>

</div>

</section>
<script type="module" src="login.js"></script>

</body>
</html>
