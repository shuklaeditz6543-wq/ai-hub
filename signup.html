<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up | AI Hub</title>

<link rel="stylesheet" href="style.css">

<style>

.signup-page{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.signup-card{

width:100%;
max-width:430px;

background:#1e293b;

padding:35px;

border-radius:20px;

box-shadow:0 0 25px rgba(56,189,248,.35);

text-align:center;

}

.signup-card h1{

color:#38bdf8;

margin-bottom:10px;

}

.signup-card p{

color:#cbd5e1;

margin-bottom:25px;

}

.signup-card input{

width:100%;

padding:15px;

margin:10px 0;

border:none;

border-radius:10px;

background:#0f172a;

color:white;

font-size:16px;

}

.signup-card input:focus{

outline:2px solid #38bdf8;

}

.signup-btn{

width:100%;

padding:15px;

margin-top:15px;

border:none;

border-radius:10px;

background:#38bdf8;

color:white;

font-size:18px;

cursor:pointer;

transition:.3s;

}

.signup-btn:hover{

transform:scale(1.03);

background:#0ea5e9;

}

.google-btn{

width:100%;

padding:15px;

margin-top:15px;

border:none;

border-radius:10px;

background:white;

color:black;

font-size:16px;

cursor:pointer;

}

.login-link{

margin-top:20px;

display:block;

color:#38bdf8;

text-decoration:none;

}

.terms{

margin-top:15px;

font-size:14px;

color:#cbd5e1;

text-align:left;

}

</style>

</head>

<body>

<section class="signup-page">

<div class="signup-card">

<h1>🤖 AI Hub</h1>

<p>Create Your Account 🚀</p>

<input type="text" id="name" placeholder="👤 Full Name">

<input type="email" id="email" placeholder="📧 Email">

<input type="password" id="password" placeholder="🔒 Password">

<button class="signup-btn" id="signupBtn">
🚀 Create Account
</button>

<button class="google-btn" id="googleBtn">
  🔵 Continue with Google
</button>

<div class="terms">
<input type="checkbox">
I agree to the Terms & Conditions
</div>

Already have an account?

Login →

</a>

<br>

<a href="index.html" class="visit-btn">

⬅ Back to Home

</a>

</div>

</section>
<script type="module" src="signup.js"></script>

</body>
</html>
